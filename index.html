<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Anti-Spam Game Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --logo-size: 300px; 
            --easing-bouncy: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-speed: 0.4s;
            --damage-color: #ff4757;
        }

        body {
            height: 100vh;
            background-color: #ededed;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        /* Wrapper sekarang memenuhi layar agar logo bisa pindah kemana saja */
        .game-wrapper {
            position: absolute;
            width: var(--logo-size);
            height: auto;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            /* Transisi halus saat pindah posisi */
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 10;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
            -webkit-user-drag: none;
            transition: transform var(--transition-speed) var(--easing-bouncy), 
                        filter var(--transition-speed) ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .logo-container img:active {
            transform: scale(0.92); 
            transition: transform 0.05s ease-out; 
        }

        /* STYLING ANGKA DAMAGE */
        .damage-indicator {
            position: absolute;
            font-size: 2rem;
            font-weight: 700;
            color: var(--damage-color);
            pointer-events: none;
            z-index: 20;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            animation: floatUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="game-wrapper">
        <div class="logo-container">
            <img src="assets/images/KUlogo3d 2.png" alt="Logo KU 3D" id="logo">
        </div>
    </div>

    <script>
        const logo = document.getElementById('logo');
        const wrapper = document.getElementById('game-wrapper');
        
        let clickCount = 0;
        let resetTimeout;

        function handleInteraction(e) {
            createDamageIndicator(e);
            checkOverload();
        }

        logo.addEventListener('mousedown', (e) => handleInteraction(e));
        logo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInteraction(e.touches[0]);
        });

        function checkOverload() {
            clickCount++;
            
            // Reset hitungan jika tidak ada klik dalam 1 detik
            clearTimeout(resetTimeout);
            resetTimeout = setTimeout(() => {
                clickCount = 0;
            }, 1000);

            // Jika tap sudah 5 kali berturut-turut
            if (clickCount >= 5) {
                teleportLogo();
                clickCount = 0; // Reset setelah kabur
            }
        }

        function teleportLogo() {
            // Hitung batas aman agar logo tidak keluar layar
            const padding = 100;
            const maxX = window.innerWidth - padding;
            const maxY = window.innerHeight - padding;
            
            // Koordinat acak
            const randomX = Math.random() * (maxX - padding) + padding;
            const randomY = Math.random() * (maxY - padding) + padding;

            // Pindahkan wrapper
            wrapper.style.left = `${randomX}px`;
            wrapper.style.top = `${randomY}px`;
            
            // Efek visual saat kabur (sedikit buram karena cepat)
            logo.style.filter = 'blur(4px) brightness(1.2)';
            setTimeout(() => {
                logo.style.filter = 'drop-shadow(0 5px 10px rgba(0,0,0,0.1))';
            }, 400);
        }

        function createDamageIndicator(event) {
            const indicator = document.createElement('div');
            indicator.classList.add('damage-indicator');
            
            const damage = Math.floor(Math.random() * 10) + 1;
            indicator.innerText = `-${damage}`;

            // Muncul di posisi klik/tap agar lebih akurat
            indicator.style.left = `${Math.random() * 60 - 30}px`; 
            indicator.style.top = `-20px`;

            wrapper.appendChild(indicator);

            setTimeout(() => { indicator.remove(); }, 800);
        }
    </script>

</body>
</html>
