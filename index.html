<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Transparan Okta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Hitam Soft (tidak pekat, tapi tidak abu-abu terang) */
            background-color: #121212; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .video-wrapper {
            /* Ukuran pas di tengah, tidak terlalu besar */
            width: 45%; 
            max-width: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: auto;
            filter: none;
            outline: none;
            border: none;
            display: block;
            /* Opsional: sedikit kehalusan pada rendering video */
            mix-blend-mode: normal; 
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay loop muted playsinline disablePictureInPicture>
            <source src="assets/videos/video_transparan_okta.webm" type="video/webm">
        </video>
    </div>

</body>
</html>
