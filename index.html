<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Transparan Okta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .video-wrapper {
            /* Kontrol ukuran di sini */
            width: 50%;         /* Lebar video 50% dari lebar layar */
            max-width: 400px;    /* Tapi jangan lebih dari 400px (biar gak kegedean di PC) */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 50%;        /* Mengikuti lebar video-wrapper */
            height: auto;       /* Tinggi otomatis biar gak gepeng */
            filter: none;
            outline: none;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay loop muted playsinline disablePictureInPicture>
            <source src="assets/videos/video_transparan_okta.webm" type="video/webm">
        </video>
    </div>

</body>
</html>
