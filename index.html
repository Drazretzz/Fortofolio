<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Transparan Okta</title>
    <style>
        /* Reset margin dan padding agar benar-benar bersih */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Background hitam pekat */
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Mencegah scrollbar muncul */
            color: white;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            /* Ukuran video */
            width: 100%;
            max-width: 720px; /* Sesuaikan dengan kebutuhan */
            
            /* Menghapus filter shadow */
            filter: none; 
            
            /* Memastikan tidak ada border atau outline */
            outline: none;
            border: none;

            /* Menghilangkan sedikit gap di bawah video (display block) */
            display: block; 
        }
    </style>
</head>
<body>

    <div class="container">
        <video autoplay loop muted playsinline disablePictureInPicture>
            <source src="assets/videos/video_transparan_okta.webm" type="video/webm">
            Browser kamu tidak mendukung video WebM.
        </video>
    </div>

</body>
</html>
