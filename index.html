<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Transparan Okta</title>
    <style>
        body {
            /* Background gradasi biar kelihatan transparansinya */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        video {
            width: 80%;
            max-width: 500px;
            /* Efek shadow biar makin estetik */
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Testing Video Transparan</h1>
        
        <video autoplay loop muted playsinline>
            <source src="output.webm" type="video/webm">
            Browser kamu nggak support video WebM.
        </video>
        
        <p>Video ini transparan (Alpha Channel VP9)</p>
    </div>

</body>
</html>
