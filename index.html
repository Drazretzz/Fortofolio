<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaksi Logo Game Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --logo-size: 300px; 
            --easing-bouncy: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-speed: 0.4s;
            --damage-color: #ff4757; /* Warna angka damage */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ededed;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: var(--logo-size);
            height: auto;
            display: block;
            cursor: pointer;
            -webkit-user-drag: none;
            transition: transform var(--transition-speed) var(--easing-bouncy), 
                        filter var(--transition-speed) ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            position: relative;
            z-index: 2;
        }

        .logo-container img:active {
            transform: scale(0.92); 
            transition: transform 0.05s ease-out; 
        }

        /* --- STYLING ANGKA DAMAGE --- */
        .damage-indicator {
            position: absolute;
            font-size: 2rem;
            font-weight: 700;
            color: var(--damage-color);
            pointer-events: none; /* Agar angka tidak menghalangi klik */
            z-index: 3;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            animation: floatUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        /* --- ANIMASI MELAYANG & HILANG --- */
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="game-area">
        <div class="logo-container">
            <img src="assets/images/KUlogo3d 2.png" alt="Logo KU 3D" id="logo">
        </div>
    </div>

    <script>
        const logo = document.getElementById('logo');
        const gameArea = document.getElementById('game-area');

        logo.addEventListener('mousedown', (e) => {
            createDamageIndicator(e);
        });

        // Mendukung layar sentuh (mobile)
        logo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Mencegah zoom/scroll saat tap cepat
            createDamageIndicator(e.touches[0]);
        });

        function createDamageIndicator(event) {
            // 1. Buat element angka
            const indicator = document.createElement('div');
            indicator.classList.add('damage-indicator');
            
            // 2. Acak angka 1 - 10
            const damage = Math.floor(Math.random() * 10) + 1;
            indicator.innerText = `-${damage}`;

            // 3. Tentukan Posisi (di sekitar area klik dengan sedikit variasi acak)
            const rect = logo.getBoundingClientRect();
            const xVariasi = (Math.random() - 0.5) * 100; // Acak ke kiri/kanan 50px
            
            // Letakkan di tengah logo secara horizontal, dan sedikit di atas secara vertikal
            indicator.style.left = `calc(50% + ${xVariasi}px)`;
            indicator.style.top = `20%`;

            // 4. Masukkan ke dalam wrapper
            gameArea.appendChild(indicator);

            // 5. Hapus element dari DOM setelah animasi selesai (0.8 detik)
            setTimeout(() => {
                indicator.remove();
            }, 800);
        }
    </script>

</body>
</html>
